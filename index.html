<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - Your favourite songs here !</title>
    <link rel="stylesheet" href="./src/style.css">
    <script src="./dist/index.js" defer></script>
</head>

<body>
    <nav>
        <ul>
            <li class="logo">
                <img src="./src/images/logo.png" alt="logo">
            </li>
            <li>Home</li>
            <li>About</li>
        </ul>
    </nav>

    <main>
        <h2 class="songsMainTitle">Trending - 1990s Old Hit Songs</h2>
        <div class="musics">
            <div class="musicCoverImage"></div>
            <p class="musicName">Dil Kahta Hai</p>
            <p class="musicDuration">5:43</p>
        </div>

    </main>

    <div class="musicPlayer">
        <input type="range" class="musicController" min="0" max="100" value="0">
        <div class="icons">
            <div class="icon" id="reverseButton"></div>
            <div class="icon" id="playButton"></div>
            <div class="icon" id="nextButton"></div>
        </div>
    </div>

</body>

</html>
